<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Here to Slay</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- ── Join screen: shown until you join a room ───────────────────────── -->
  <div id="join-screen" class="screen">
    <div class="panel">
      <h1>Here to Slay</h1>
      <label>Room
        <input id="room-input" value="table1" autocomplete="off">
      </label>
      <label>Your name
        <input id="name-input" value="" placeholder="Player" autocomplete="off">
      </label>
      <button id="join-btn">Join</button>
      <p class="hint">Open this page in several tabs (or share the URL) and join the
        same room to play together.</p>
    </div>
  </div>

  <!-- ── Lobby: shown after joining, before the game starts ─────────────── -->
  <div id="lobby-screen" class="screen hidden">
    <div class="panel">
      <h1>Lobby — <span id="lobby-room"></span></h1>
      <ul id="lobby-players"></ul>
      <button id="start-btn">Start game</button>
      <p class="hint">Need at least 2 players. Anyone can start.</p>
    </div>
  </div>

  <!-- ── Game board ─────────────────────────────────────────────────────── -->
  <div id="game-screen" class="screen hidden">
    <header id="topbar">
      <span id="phase-pill" class="pill"></span>
      <span id="turn-pill" class="pill"></span>
      <span class="pill">Deck: <b id="deck-count">0</b></span>
      <span class="pill">Discard: <span id="discard-top">—</span></span>
    </header>

    <!-- Contextual banner: whose turn / challenge window / modifier / prompt -->
    <section id="prompt-panel"></section>

    <section id="opponents"></section>

    <section class="board-block">
      <h2>Monster Row</h2>
      <div id="monster-row" class="card-row"></div>
    </section>

    <section class="board-block" id="me-block">
      <h2>You <span id="me-name"></span> — AP: <b id="me-ap">0</b></h2>
      <div class="subrow">
        <div>
          <h3>Leader</h3>
          <div id="me-leader" class="card-row"></div>
        </div>
        <div class="grow">
          <h3>Party</h3>
          <div id="me-party" class="card-row"></div>
        </div>
      </div>
      <h3>Hand</h3>
      <div id="me-hand" class="card-row"></div>
      <div id="action-bar">
        <button data-act="draw_card">Draw (1 AP)</button>
        <button data-act="discard_all">Discard all (3 AP)</button>
        <button data-act="end_turn">End turn</button>
      </div>
    </section>
  </div>

  <div id="error-toast" class="hidden"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
